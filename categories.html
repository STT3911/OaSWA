<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Categories — TechStore</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/categories.css">
</head>
<body>

<div class="page-wrapper">

  <div id="site-header" data-page="categories"></div>

  <main class="categories-main">
    <div class="container">

      <div class="categories-heading">
        <h1>Product Categories</h1>
        <p>Browse our wide selection of premium electronics by category</p>
      </div>

      <div class="categories-grid">
        <a href="index.html?category=audio" class="category-card">
          <img src="images/headp1.jpg" alt="Audio">
          <div class="category-overlay">
            <span class="category-name">Audio</span>
            <span class="category-count">2 products</span>
          </div>
        </a>

        <a href="index.html?category=computers" class="category-card">
          <img src="images/note2.jpg" alt="Computers">
          <div class="category-overlay">
            <span class="category-name">Computers</span>
            <span class="category-count">2 products</span>
          </div>
        </a>

        <a href="index.html?category=wearables" class="category-card">
          <img src="images/watch3.jpg" alt="Wearables">
          <div class="category-overlay">
            <span class="category-name">Wearables</span>
            <span class="category-count">1 product</span>
          </div>
        </a>

        <a href="index.html?category=photography" class="category-card">
          <img src="images/camera1.jpg" alt="Photography">
          <div class="category-overlay">
            <span class="category-name">Photography</span>
            <span class="category-count">1 product</span>
          </div>
        </a>

        <a href="index.html?category=tablets" class="category-card">
          <img src="images/tab2.jpg" alt="Tablets">
          <div class="category-overlay">
            <span class="category-name">Tablets</span>
            <span class="category-count">2 products</span>
          </div>
        </a>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
</div>

<script src="js/header.js"></script>
<script src="js/footer.js"></script>
<script src="js/layout.js"></script>
</body>
</html>
