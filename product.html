<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — TechStore</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/product.css">
</head>
<body>
<div class="page-wrapper">

  <div id="site-header" data-page="products"></div>

  <main class="product-main">
    <div class="container">

      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

      <div id="productDetail" class="product-detail-wrap">
        <div class="product-loading">Loading...</div>
      </div>

      <section class="related-section" id="relatedSection" hidden>
        <h2 class="related-title">Related Products</h2>
        <div class="related-grid" id="relatedGrid"></div>
      </section>

    </div>
  </main>

  <div id="site-footer"></div>
</div>

<script src="js/header.js"></script>
<script src="js/footer.js"></script>
<script src="js/layout.js"></script>
<script src="js/data.js"></script>
<script src="js/stars.js"></script>
<script src="js/product.js"></script>
</body>
</html>
