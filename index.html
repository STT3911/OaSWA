<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore &mdash; Premium Electronics</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/catalog.css">
</head>
<body>
    <div id="site-header" data-page="products"></div>

    <main class="container">
        <div class="catalog-title">
            <h1>Premium Electronics</h1>
            <p>Discover our curated collection of high-quality tech products</p>
        </div>

        <div class="catalog-toolbar">
            <div class="catalog-toolbar__left">
                <button type="button" class="catalog-filter-btn" aria-label="Filters">
                    <img src="icons/filters.svg" alt="" width="16" height="16" aria-hidden="true">
                    <span>Filters</span>
                </button>
                <span id="products-count"></span>
            </div>
            <div class="sort">
                <label class="sort__label" for="sort-select">Sort by:</label>
                <div class="sort-select-wrap">
                    <select id="sort-select" class="sort-select" onchange="applySortAndFilter()">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                    <span class="sort-select__chev" aria-hidden="true">
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1.5 6 6.5 11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                </div>
            </div>
        </div>

        <div class="catalog-layout">
            <aside class="filters">
                <div class="filters__panel">
                    <h2 class="filters__title">
                        <img src="icons/filters.svg" alt="" width="20" height="20" aria-hidden="true">
                        Filters
                    </h2>

                    <div class="filter-group">
                        <h3 class="filter-group__title">Rating</h3>
                        <div class="filter-group__options">
                            <label class="filter-option"><input type="radio" name="rating" value="5"> 5+ Stars</label>
                            <label class="filter-option"><input type="radio" name="rating" value="4"> 4+ Stars</label>
                            <label class="filter-option"><input type="radio" name="rating" value="3"> 3+ Stars</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3 class="filter-group__title">Price Range</h3>
                        <div class="dual-slider-container">
                            <div class="dual-slider-track"></div>
                            <div class="dual-slider-fill" id="slider-fill"></div>
                            <input type="range" min="0" max="3000" value="0" id="slider-min" class="dual-slider-input">
                            <input type="range" min="0" max="3000" value="3000" id="slider-max" class="dual-slider-input">
                        </div>
                        <div class="price-labels">
                            <span id="price-min-label">$0</span>
                            <span id="price-max-label">$3000</span>
                        </div>
                    </div>

                    <button type="button" class="btn-clear" onclick="clearFilters()">Clear All Filters</button>
                </div>
            </aside>

            <div class="catalog-right">
                <div class="products-grid" id="products-grid"></div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/data.js"></script>
    <script src="js/stars.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/catalog.js"></script>
</body>
</html>
